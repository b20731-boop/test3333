<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>슬기로운 이화 생활</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚙️ 보내주신 실제 Firebase 설정값을 정확하게 연동했습니다!
        const firebaseConfig = {
            apiKey: "AIzaSyCuIZcHnk_D7N2uNt4PeBkszdATVf4phYk",
            authDomain: "project-3790660022262076624.firebaseapp.com",
            projectId: "project-3790660022262076624",
            storageBucket: "project-3790660022262076624.firebasestorage.app",
            messagingSenderId: "418771303222",
            appId: "1:418771303222:web:c2c186f094dce78cb81197",
            measurementId: "G-T4BQ9815DL"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 상태 관리 변수들
        let currentUser = null;
        let userRole = null; 
        let selectedGrade = null;
        let selectedSubject = null;
        let currentTab = 'board'; 

        // 기획서 기준 1, 2, 3학년 과목 목록 데이터 세팅 [cite: 35, 48, 70]
        const subjectsData = {
            1: ["국어", "공통수학", "통합과학", "통합사회", "영어", "한국사", "체육", "음악", "미술", "종교", "과학탐구실험"],
            2: ["문학", "영어", "대수", "확률과 통계", "물리", "화학", "생명", "지구", "세계시민과 지리", "사회 문화", "생활과 윤리", "세계사", "프로그래밍", "일본어", "프랑스어", "독일어", "중국어", "종교", "스포츠 문화", "음악 연주와 창작", "미술 창작"],
            3: ["화법과 작문", "언어와 매체", "심화 국어", "영어 독해와 작문", "심화 영어 독해", "동아시아사", "여행지리", "사회문제 탐구", "고전과 윤리", "현대사회와 윤리", "물리학 II", "화학 II", "생명과학 II", "지구과학 II", "생활과 과학", "운동과 건강", "체육 전공 실기 기초", "체육과 진로 탐구", "음악 감상과 비평", "드로잉", "미술 전공 실기", "독일어", "일본어II", "프랑스어II", "독일어 독해와 작문II", "세계지리", "뉴스와 미디어"]
        };

        // 화면 전환 함수
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
        }

        // 시작하기 버튼 - 역할 정의 [cite: 2]
        window.selectRole = function(role) {
            userRole = role;
            handleLogin();
        }

        // Google 로그인 처리 및 이메일 도메인 유효성 제한 검증 [cite: 3, 4, 114]
        async function handleLogin() {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                const email = user.email;

                if (userRole === 'student') {
                    if (!email.endsWith('@ewha.hs.kr')) {
                        alert("학생은 @ewha.hs.kr 계정만 사용 가능합니다."); [cite: 3]
                        await signOut(auth);
                        return;
                    }
                } else if (userRole === 'teacher') {
                    if (!email.endsWith('@ewha.hs.kr') && !email.endsWith('@sen.go.kr')) {
                        alert("교직원은 @ewha.hs.kr 또는 @sen.go.kr 계정만 사용 가능합니다."); [cite: 4]
                        await signOut(auth);
                        return;
                    }
                    // 교직원용 별도 실명 입력란 [cite: 8]
                    const customName = prompt("사용하실 이름을 입력해주세요 (공백 시 구글 이름 사용):");
                    user.customDisplayName = customName ? customName : user.displayName;
                }

                currentUser = user;
                showScreen('gradeScreen'); // 학년 선택창으로 진입 [cite: 5]
            } catch (error) {
                console.error(error);
                alert("로그인에 실패했습니다.");
            }
        }

        // 학년 선택 및 과목 바인딩 [cite: 5]
        window.selectGrade = function(grade) {
            selectedGrade = grade;
            const subjectContainer = document.getElementById('subjectList');
            subjectContainer.innerHTML = '';
            
            subjectsData[grade].forEach(subj => {
                const btn = document.createElement('button');
                btn.className = "w-full p-4 bg-white border rounded-xl shadow-sm text-left hover:bg-emerald-50 font-medium transition";
                btn.innerText = subj;
                btn.onclick = () => selectSubject(subj);
                subjectContainer.appendChild(btn);
            });
            showScreen('subjectScreen');
        }

        window.selectSubject = function(subject) {
            selectedSubject = subject;
            document.getElementById('currentSubjectTitle').innerText = `${selectedGrade}학년 > ${selectedSubject}`;
            showScreen('mainScreen');
            switchTab('board');
        }

        // 뒤로가기 내비게이션 처리 [cite: 6]
        window.goBack = function(toScreen) {
            showScreen(toScreen);
        }

        // 탭 제어 (게시판 / 공지 / 나의 질문·나의 답변) [cite: 8, 9]
        window.switchTab = function(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('border-emerald-600', 'text-emerald-600'));
            document.getElementById(`tab-${tab}`).classList.add('border-emerald-600', 'text-emerald-600');
            
            if(userRole === 'student') {
                document.getElementById('tab-my').innerText = "나의 질문"; [cite: 8]
            } else {
                document.getElementById('tab-my').innerText = "나의 답변"; [cite: 9]
            }

            const writeBtn = document.getElementById('floatingWriteBtn');
            if (userRole === 'student' && tab === 'board') {
                writeBtn.classList.remove('hidden');
                writeBtn.innerText = "+ 질문하기"; [cite: 10]
            } else if (userRole === 'teacher' && tab === 'notice') {
                writeBtn.classList.remove('hidden');
                writeBtn.innerText = "+ 공지 작성"; [cite: 16]
            } else {
                writeBtn.classList.add('hidden');
            }

            loadPosts();
        }

        // Firestore 실시간 데이터 피드 구독 처리
        let unsubscribe = null;
        function loadPosts() {
            if(unsubscribe) unsubscribe();
            const listContainer = document.getElementById('postList');
            listContainer.innerHTML = '<p class="text-center text-gray-500 py-8">로딩 중...</p>';

            let q;
            const postsRef = collection(db, "posts");

            // 규칙 쿼리 빌드 (질문 정렬은 항상 위에서 아래로: 올린 순 오름차순 정렬) [cite: 12, 131]
            if (currentTab === 'board') {
                q = query(postsRef, where("subject", "==", selectedSubject), where("grade", "==", selectedGrade), where("type", "==", "question"), orderBy("createdAt", "asc"));
            } else if (currentTab === 'notice') {
                q = query(postsRef, where("subject", "==", selectedSubject), where("grade", "==", selectedGrade), where("type", "==", "notice"), orderBy("createdAt", "asc"));
            } else if (currentTab === 'my') {
                if (userRole === 'student') {
                    q = query(postsRef, where("subject", "==", selectedSubject), where("grade", "==", selectedGrade), where("type", "==", "question"), where("uid", "==", currentUser.uid), orderBy("createdAt", "asc"));
                } else {
                    q = query(postsRef, where("subject", "==", selectedSubject), where("grade", "==", selectedGrade), where("repliedBy", "==", currentUser.uid), orderBy("createdAt", "asc"));
                }
            }

            unsubscribe = onSnapshot(q, (snapshot) => {
                listContainer.innerHTML = '';
                if(snapshot.empty) {
                    listContainer.innerHTML = '<p class="text-center text-gray-400 py-12">등록된 내용이 없습니다.</p>';
                    return;
                }
                snapshot.forEach((docSnap) => {
                    const post = docSnap.data();
                    const postId = docSnap.id;
                    
                    // 권한별 작성자 이름 노출 필터링 (학생은 익명, 교사는 실명) [cite: 11, 20, 115]
                    let authorName = "익명";
                    if (post.type === 'notice') {
                        authorName = post.authorName; 
                    } else if (userRole === 'teacher') {
                        authorName = post.authorName; 
                    }

                    const card = document.createElement('div');
                    card.className = "p-4 bg-white border rounded-xl shadow-sm space-y-3 text-left";
                    
                    let statusBadge = post.type === 'question' ? 
                        (post.isReplied ? '<span class="text-xs bg-green-100 text-green-800 px-2 py-1 rounded font-medium">답변 완료</span>' : '<span class="text-xs bg-amber-100 text-amber-800 px-2 py-1 rounded font-medium">답변 대기</span>') 
                        : '<span class="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded font-medium">공지사항</span>';

                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <h4 class="font-bold text-lg text-gray-800">${post.title}</h4>
                            ${statusBadge}
                        </div>
                        <p class="text-gray-600 text-sm whitespace-pre-wrap">${post.content}</p>
                        ${post.imageUrl ? `<img src="${post.imageUrl}" class="max-h-60 rounded-lg object-cover border w-full" />` : ''}
                        <div class="text-xs text-gray-400 flex justify-between pt-2 border-t">
                            <span>작성자: ${authorName}</span>
                        </div>
                        <div id="comment-section-${postId}" class="bg-gray-50 p-3 rounded-lg space-y-2 mt-2"></div>
                    `;

                    buildCommentSystem(card, postId, post);
                    listContainer.appendChild(card);
                });
            });
        }

        // 답변 및 상호작용 댓글 시스템 인터페이스 빌드 [cite: 17, 18, 19]
        function buildCommentSystem(card, postId, post) {
            const commentArea = card.querySelector(`#comment-section-${postId}`);
            
            if(post.reply) {
                const replyDiv = document.createElement('div');
                replyDiv.className = "p-2 bg-emerald-50 border border-emerald-200 rounded text-sm";
                replyDiv.innerHTML = `<strong>💡 선생님 답변:</strong> ${post.reply}`; [cite: 18]
                commentArea.appendChild(replyDiv);
            }

            if(post.comments && post.comments.length > 0) {
                post.comments.forEach(cmt => {
                    const cmtDiv = document.createElement('div');
                    cmtDiv.className = "text-xs text-gray-700 border-b pb-1 last:border-none";
                    let cmtAuthor = userRole === 'teacher' ? cmt.authorName : (cmt.role === 'teacher' ? '선생님' : '익명');
                    cmtDiv.innerHTML = `<strong>${cmtAuthor}:</strong> ${cmt.text}`;
                    commentArea.appendChild(cmtDiv);
                });
            }

            const actionDiv = document.createElement('div');
            actionDiv.className = "flex gap-2 mt-2";

            if (post.type === 'question' && userRole === 'teacher') {
                actionDiv.innerHTML = `
                    <input type="text" id="input-${postId}" placeholder="답변을 입력하세요..." class="flex-1 text-sm p-2 border rounded">
                    <button onclick="submitTeacherReply('${postId}')" class="bg-emerald-600 text-white text-xs px-3 py-2 rounded font-medium">답변 달기</button>
                `; [cite: 18]
            } else if (post.type === 'notice' || (post.type === 'question' && post.isReplied)) {
                actionDiv.innerHTML = `
                    <input type="text" id="input-${postId}" placeholder="댓글 추가..." class="flex-1 text-sm p-2 border rounded">
                    <button onclick="submitComment('${postId}')" class="bg-gray-600 text-white text-xs px-3 py-2 rounded font-medium">등록</button>
                `; [cite: 17, 19]
            }
            commentArea.appendChild(actionDiv);
        }

        // 교직원 전용 답변 처리 [cite: 18]
        window.submitTeacherReply = async function(postId) {
            const input = document.getElementById(`input-${postId}`);
            if(!input.value.trim()) return;

            const postRef = doc(db, "posts", postId);
            await setDoc(postRef, {
                reply: input.value,
                isReplied: true,
                repliedBy: currentUser.uid
            }, { merge: true });
            input.value = '';
        }

        // 공지 및 피드백 댓글 쓰기 처리 [cite: 17, 19]
        window.submitComment = async function(postId) {
            const input = document.getElementById(`input-${postId}`);
            if(!input.value.trim()) return;

            const postRef = doc(db, "posts", postId);
            const postSnap = await getDoc(postRef);
            const currentComments = postSnap.data().comments || [];

            const newComment = {
                uid: currentUser.uid,
                authorName: userRole === 'teacher' ? (currentUser.customDisplayName || currentUser.displayName) : currentUser.displayName,
                role: userRole,
                text: input.value,
                createdAt: Date.now()
            };

            await setDoc(postRef, {
                comments: [...currentComments, newComment]
            }, { merge: true });
            input.value = '';
        }

        window.openWriteModal = function() {
            document.getElementById('modalTitle').innerText = currentTab === 'board' ? '새 질문 작성' : '새 공지 작성';
            document.getElementById('writeModal').classList.remove('hidden');
        }
        window.closeWriteModal = function() {
            document.getElementById('writeModal').classList.add('hidden');
            document.getElementById('postForm').reset();
        }

        // 포스트 제출 및 무료 이미지 호스팅 임시 우회 적용 [cite: 10, 11]
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.innerText = "업로드 중...";
            submitBtn.disabled = true;

            const title = document.getElementById('titleInput').value;
            const content = document.getElementById('contentInput').value;
            const fileInput = document.getElementById('fileInput');
            
            let imageUrl = "";

            if(fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const formData = new FormData();
                formData.append("image", file);

                try {
                    const response = await fetch("https://api.imgbb.com/1/upload?key=6f108d9bdf11467be51ebff9574bf1db", {
                        method: "POST",
                        body: formData
                    });
                    const resData = await response.json();
                    imageUrl = resData.data.url;
                } catch(err) {
                    console.error("이미지 업로드 실패: ", err);
                }
            }

            const postData = {
                type: currentTab === 'board' ? 'question' : 'notice',
                grade: selectedGrade,
                subject: selectedSubject,
                title: title,
                content: content,
                imageUrl: imageUrl,
                uid: currentUser.uid,
                authorName: userRole === 'teacher' ? (currentUser.customDisplayName || currentUser.displayName) : currentUser.displayName,
                isReplied: false,
                comments: [],
                createdAt: Date.now()
            };

            await addDoc(collection(db, "posts"), postData);
            submitBtn.innerText = "제출하기";
            submitBtn.disabled = false;
            closeWriteModal();
        });

    </script>
</head>
<body class="bg-gray-100 min-h-screen font-sans flex flex-col items-center">

    <div id="loginScreen" class="screen flex flex-col items-center justify-center p-6 w-full min-h-screen bg-emerald-50">
        <div class="max-w-md w-full bg-white rounded-3xl p-8 shadow-xl text-center space-y-6">
            <h1 class="text-2xl font-black text-emerald-700 tracking-tight">🌱 슬기로운 이화 생활</h1>
            <p class="text-sm text-gray-500">익명 학업 질문 및 공지사항 허브 포털</p>
            <div class="space-y-3 pt-4">
                <button onclick="selectRole('student')" class="w-full py-4 bg-emerald-600 text-white rounded-xl font-bold shadow-md hover:bg-emerald-700 transition">학생으로 시작하기</button>
                <button onclick="selectRole('teacher')" class="w-full py-4 bg-white border-2 border-emerald-600 text-emerald-700 rounded-xl font-bold hover:bg-emerald-50 transition">교직원으로 시작하기</button>
            </div>
        </div>
    </div>

    <div id="gradeScreen" class="screen hidden w-full max-w-md p-6 pt-12 space-y-6 text-center">
        <h2 class="text-xl font-bold text-gray-800 text-left">대상을 선택하세요.</h2>
        <div class="grid grid-cols-1 gap-4">
            <button onclick="selectGrade(1)" class="p-6 bg-white border rounded-2xl shadow-sm text-left hover:border-emerald-500 group"><b class="text-lg block group-hover:text-emerald-600">&lt; 1학년 &gt;</b><span class="text-xs text-gray-400">공통 교과 과정</span></button>
            <button onclick="selectGrade(2)" class="p-6 bg-white border rounded-2xl shadow-sm text-left hover:border-emerald-500 group"><b class="text-lg block group-hover:text-emerald-600">&lt; 2학년 &gt;</b><span class="text-xs text-gray-400">선택형 교과 과정</span></button>
            <button onclick="selectGrade(3)" class="p-6 bg-white border rounded-2xl shadow-sm text-left hover:border-emerald-500 group"><b class="text-lg block group-hover:text-emerald-600">&lt; 3학년 &gt;</b><span class="text-xs text-gray-400">심화 교과 과정</span></button>
        </div>
    </div>

    <div id="subjectScreen" class="screen hidden w-full max-w-md p-6 pt-6 space-y-4 text-center">
        <div class="flex items-center gap-2"><button onclick="goBack('gradeScreen')" class="text-gray-500 text-sm hover:underline">← 뒤로가기</button></div>
        <h2 class="text-xl font-bold text-gray-800 text-left">과목을 선택하세요.</h2>
        <div id="subjectList" class="grid grid-cols-1 gap-2 max-h-[70vh] overflow-y-auto pr-1"></div>
    </div>

    <div id="mainScreen" class="screen hidden w-full max-w-md min-h-screen bg-white shadow-md flex flex-col relative text-center">
        <header class="p-4 border-b bg-white sticky top-0 z-10 flex justify-between items-center text-left">
            <div>
                <button onclick="goBack('subjectScreen')" class="text-xs text-gray-400 block hover:underline">← 과목변경</button>
                <h3 id="currentSubjectTitle" class="font-bold text-lg text-emerald-800">과목</h3>
            </div>
        </header>
        <nav class="flex border-b text-center text-sm font-medium bg-gray-50">
            <button id="tab-board" onclick="switchTab('board')" class="tab-btn flex-1 py-3 border-b-2 border-transparent text-gray-500">게시판</button>
            <button id="tab-notice" onclick="switchTab('notice')" class="tab-btn flex-1 py-3 border-b-2 border-transparent text-gray-500">공지</button>
            <button id="tab-my" onclick="switchTab('my')" class="tab-btn flex-1 py-3 border-b-2 border-transparent text-gray-500">나의 방</button>
        </nav>
        <main id="postList" class="flex-1 p-4 space-y-4 overflow-y-auto bg-gray-50 pb-24"></main>
        <button id="floatingWriteBtn" onclick="openWriteModal()" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-48 bg-emerald-600 text-white font-bold py-3 px-4 rounded-full shadow-lg hover:bg-emerald-700 transition z-20">+ 작성하기</button>
    </div>

    <div id="writeModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 space-y-4">
            <h3 id="modalTitle" class="text-lg font-bold text-gray-900 text-left">새 글 작성</h3>
            <form id="postForm" class="space-y-3 text-left">
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">제목</label>
                    <input type="text" id="titleInput" required class="w-full p-2.5 border rounded-lg text-sm" placeholder="제목을 입력하세요">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">내용</label>
                    <textarea id="contentInput" rows="5" required class="w-full p-2.5 border rounded-lg text-sm" placeholder="상세 내용을 적어주세요"></textarea>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">사진 추가 (선택)</label>
                    <input type="file" id="fileInput" accept="image/*" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100">
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="closeWriteModal()" class="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-lg text-sm font-medium">취소</button>
                    <button type="submit" class="flex-1 py-2.5 bg-emerald-600 text-white rounded-lg text-sm font-medium shadow">제출하기</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
